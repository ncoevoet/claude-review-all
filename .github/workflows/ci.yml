name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # shellcheck is pre-installed on ubuntu-latest runners.
      - name: ShellCheck
        run: shellcheck -S warning skills/review-all/scripts/*.sh tests/*.sh

      - name: Test suite
        run: bash tests/run.sh
